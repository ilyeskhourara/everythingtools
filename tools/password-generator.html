<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="مولد كلمات مرور قوية وآمنة - Everything Tools">
  <title>مولد كلمات المرور — Everything Tools</title>
    <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .strength-bar { height: 6px; border-radius: 3px; background: var(--bg3); margin-top: 10px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 3px; transition: width 0.3s, background 0.3s; }
    .strength-label { font-size: 0.8rem; margin-top: 6px; font-family: var(--font-mono); }
    .bulk-list { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 16px; font-family: var(--font-mono); font-size: 0.85rem; line-height: 2; color: var(--accent); max-height: 200px; overflow-y: auto; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo"><span class="logo-icon">⬡</span><span class="logo-text">Everything<strong>Tools</strong></span></div>
      <nav class="nav"><a href="../index.html" data-i18n="nav.home">Home</a></nav><div class="lang-switcher"><button onclick="setLang('en')" class="lang-btn" id="btn-en">EN</button><button onclick="setLang('fr')" class="lang-btn" id="btn-fr">FR</button><button onclick="setLang('ar')" class="lang-btn" id="btn-ar">AR</button></div>
    </div>
  </header>

  <div class="tool-page-header">
    <div class="container">
      <a href="../index.html" class="back-link">← العودة للرئيسية</a>
      <h1>🔐 مولد كلمات المرور</h1>
      <p>أنشئ كلمات مرور قوية وآمنة بنقرة واحدة</p>
    </div>
  </div>

  <div class="tool-workspace">
    <div class="container">
      <div class="ad-slot ad-banner"><span class="ad-label">إعلان</span></div>

      <div class="tool-box">
        <h2>الإعدادات</h2>

        <div class="slider-row">
          <label>الطول</label>
          <input type="range" id="length" min="6" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value; generate()">
          <span id="lenVal">16</span>
        </div>

        <div class="checkbox-row"><input type="checkbox" id="upper" checked onchange="generate()"><label for="upper">أحرف كبيرة (A-Z)</label></div>
        <div class="checkbox-row"><input type="checkbox" id="lower" checked onchange="generate()"><label for="lower">أحرف صغيرة (a-z)</label></div>
        <div class="checkbox-row"><input type="checkbox" id="numbers" checked onchange="generate()"><label for="numbers">أرقام (0-9)</label></div>
        <div class="checkbox-row"><input type="checkbox" id="symbols" onchange="generate()"><label for="symbols">رموز (!@#$%^&*)</label></div>
      </div>

      <div class="tool-box">
        <h2>كلمة المرور</h2>
        <div class="result-box" id="passwordOutput" style="font-size:1.1rem;letter-spacing:0.05em"></div>
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
        <div class="row-btns">
          <button class="btn" onclick="generate()">🔄 توليد جديد</button>
          <button class="btn btn-outline" onclick="copyToClipboard(document.getElementById('passwordOutput').textContent, this)">📋 نسخ</button>
        </div>
      </div>

      <div class="tool-box">
        <h2>توليد متعدد</h2>
        <div class="slider-row">
          <label>عدد كلمات المرور</label>
          <input type="range" id="bulkCount" min="2" max="20" value="5" oninput="document.getElementById('bulkVal').textContent=this.value">
          <span id="bulkVal">5</span>
        </div>
        <button class="btn mb-4" onclick="generateBulk()">توليد مجموعة</button>
        <div class="bulk-list" id="bulkList" style="display:none"></div>
      </div>

      <div class="ad-slot ad-banner"><span class="ad-label">إعلان</span></div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    function getChars() {
      let chars = '';
      if (document.getElementById('upper').checked) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      if (document.getElementById('lower').checked) chars += 'abcdefghijklmnopqrstuvwxyz';
      if (document.getElementById('numbers').checked) chars += '0123456789';
      if (document.getElementById('symbols').checked) chars += '!@#$%^&*()-_=+[]{}|;:,.<>?';
      return chars || 'abcdefghijklmnopqrstuvwxyz';
    }

    function generateOne() {
      const len = parseInt(document.getElementById('length').value);
      const chars = getChars();
      const arr = new Uint32Array(len);
      crypto.getRandomValues(arr);
      return Array.from(arr, v => chars[v % chars.length]).join('');
    }

    function generate() {
      const pwd = generateOne();
      document.getElementById('passwordOutput').textContent = pwd;
      updateStrength(pwd);
    }

    function updateStrength(pwd) {
      let score = 0;
      if (pwd.length >= 8) score++;
      if (pwd.length >= 14) score++;
      if (/[A-Z]/.test(pwd)) score++;
      if (/[a-z]/.test(pwd)) score++;
      if (/[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      const levels = ['', 'ضعيفة جداً', 'ضعيفة', 'مقبولة', 'جيدة', 'قوية', 'قوية جداً'];
      const colors = ['', '#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#00e5a0', '#00e5a0'];
      const pct = (score / 6) * 100;
      document.getElementById('strengthFill').style.width = pct + '%';
      document.getElementById('strengthFill').style.background = colors[score] || colors[1];
      document.getElementById('strengthLabel').textContent = 'القوة: ' + (levels[score] || levels[1]);
      document.getElementById('strengthLabel').style.color = colors[score] || colors[1];
    }

    function generateBulk() {
      const count = parseInt(document.getElementById('bulkCount').value);
      const list = Array.from({length: count}, () => generateOne());
      const el = document.getElementById('bulkList');
      el.style.display = 'block';
      el.innerHTML = list.map(p => `<div>${p}</div>`).join('');
    }

    generate();
  </script>
<script src="../js/i18n.js"></script>
<script>initI18n();</script>
</body>
</html>
