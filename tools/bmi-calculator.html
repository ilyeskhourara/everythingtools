<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="حاسبة مؤشر كتلة الجسم BMI - Everything Tools">
  <title>حاسبة BMI — Everything Tools</title>
    <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .bmi-result { text-align: center; padding: 30px; }
    .bmi-number { font-size: 4rem; font-weight: 700; font-family: var(--font-mono); }
    .bmi-category { font-size: 1.2rem; font-weight: 500; margin-top: 8px; }
    .bmi-scale { margin-top: 24px; border-radius: 8px; overflow: hidden; height: 12px; display: flex; }
    .bmi-scale-seg { flex: 1; }
    .bmi-pointer { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; font-family: var(--font-mono); }
    .bmi-table { width: 100%; border-collapse: collapse; }
    .bmi-table td, .bmi-table th { padding: 10px 14px; text-align: right; font-size: 0.88rem; border-bottom: 1px solid var(--border); }
    .bmi-table th { color: var(--text-muted); font-weight: 500; font-family: var(--font-mono); font-size: 0.78rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo"><span class="logo-icon">⬡</span><span class="logo-text">Everything<strong>Tools</strong></span></div>
      <nav class="nav"><a href="../index.html" data-i18n="nav.home">Home</a></nav><div class="lang-switcher"><button onclick="setLang('en')" class="lang-btn" id="btn-en">EN</button><button onclick="setLang('fr')" class="lang-btn" id="btn-fr">FR</button><button onclick="setLang('ar')" class="lang-btn" id="btn-ar">AR</button></div>
    </div>
  </header>

  <div class="tool-page-header">
    <div class="container">
      <a href="../index.html" class="back-link">← العودة للرئيسية</a>
      <h1>⚖️ حاسبة BMI</h1>
      <p>احسب مؤشر كتلة جسمك واعرف وضعك الصحي</p>
    </div>
  </div>

  <div class="tool-workspace">
    <div class="container">
      <div class="ad-slot ad-banner"><span class="ad-label">إعلان</span></div>

      <div class="tool-box">
        <h2>أدخل بياناتك</h2>
        <div class="form-row">
          <div class="form-group">
            <label>الوزن (كيلوغرام)</label>
            <input class="input-field" type="number" id="weight" placeholder="70" min="20" max="300" oninput="calculate()">
          </div>
          <div class="form-group">
            <label>الطول (سنتيمتر)</label>
            <input class="input-field" type="number" id="height" placeholder="175" min="100" max="250" oninput="calculate()">
          </div>
        </div>
      </div>

      <div class="tool-box" id="resultBox" style="display:none">
        <h2>النتيجة</h2>
        <div class="bmi-result">
          <div class="bmi-number" id="bmiNumber">-</div>
          <div class="bmi-category" id="bmiCategory"></div>
          <div class="bmi-scale">
            <div class="bmi-scale-seg" style="background:#4D96FF"></div>
            <div class="bmi-scale-seg" style="background:#6BCB77"></div>
            <div class="bmi-scale-seg" style="background:#FFD93D"></div>
            <div class="bmi-scale-seg" style="background:#FF8E53"></div>
            <div class="bmi-scale-seg" style="background:#FF6B6B"></div>
          </div>
          <div class="bmi-pointer" id="bmiPointer"></div>
        </div>

        <table class="bmi-table" style="margin-top:10px">
          <tr><th>الفئة</th><th>مؤشر BMI</th></tr>
          <tr><td>نقص في الوزن</td><td style="color:#4D96FF">أقل من 18.5</td></tr>
          <tr><td>وزن طبيعي</td><td style="color:#6BCB77">18.5 – 24.9</td></tr>
          <tr><td>زيادة في الوزن</td><td style="color:#FFD93D">25 – 29.9</td></tr>
          <tr><td>سمنة درجة أولى</td><td style="color:#FF8E53">30 – 34.9</td></tr>
          <tr><td>سمنة مفرطة</td><td style="color:#FF6B6B">35 أو أكثر</td></tr>
        </table>
      </div>

      <div class="ad-slot ad-banner"><span class="ad-label">إعلان</span></div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    function calculate() {
      const w = parseFloat(document.getElementById('weight').value);
      const h = parseFloat(document.getElementById('height').value) / 100;
      if (!w || !h || h < 0.5) return;
      const bmi = (w / (h * h)).toFixed(1);

      let category, color;
      if (bmi < 18.5) { category = 'نقص في الوزن'; color = '#4D96FF'; }
      else if (bmi < 25) { category = '✓ وزن طبيعي'; color = '#6BCB77'; }
      else if (bmi < 30) { category = 'زيادة في الوزن'; color = '#FFD93D'; }
      else if (bmi < 35) { category = 'سمنة درجة أولى'; color = '#FF8E53'; }
      else { category = 'سمنة مفرطة'; color = '#FF6B6B'; }

      document.getElementById('bmiNumber').textContent = bmi;
      document.getElementById('bmiNumber').style.color = color;
      document.getElementById('bmiCategory').textContent = category;
      document.getElementById('bmiCategory').style.color = color;
      document.getElementById('bmiPointer').textContent = `مؤشرك: ${bmi}`;
      document.getElementById('resultBox').style.display = 'block';
    }
  </script>
<script src="../js/i18n.js"></script>
<script>initI18n();</script>
</body>
</html>
