<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="عداد الكلمات والحروف والجمل - Everything Tools">
  <title>عداد الكلمات — Everything Tools</title>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 20px; }
    .stat-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 18px; text-align: center; }
    .stat-number { font-size: 2rem; font-weight: 700; color: var(--accent); font-family: var(--font-mono); }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    textarea.input-field { min-height: 200px; resize: vertical; border-radius: 12px; line-height: 1.6; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo"><span class="logo-icon">⬡</span><span class="logo-text">Everything<strong>Tools</strong></span></div>
      <nav class="nav"><a href="../index.html" data-i18n="nav.home">Home</a></nav><div class="lang-switcher"><button onclick="setLang('en')" class="lang-btn" id="btn-en">EN</button><button onclick="setLang('fr')" class="lang-btn" id="btn-fr">FR</button><button onclick="setLang('ar')" class="lang-btn" id="btn-ar">AR</button></div>
    </div>
  </header>

  <div class="tool-page-header">
    <div class="container">
      <a href="../index.html" class="back-link">← العودة للرئيسية</a>
      <h1>📝 عداد الكلمات</h1>
      <p>عدّ الكلمات والحروف والجمل والفقرات فوراً</p>
    </div>
  </div>

  <div class="tool-workspace">
    <div class="container">
      <div class="ad-slot ad-banner"><span class="ad-label">إعلان</span></div>

      <div class="tool-box">
        <h2>أدخل النص</h2>
        <textarea class="input-field" id="textInput" placeholder="اكتب أو الصق نصك هنا..." oninput="analyze()"></textarea>
        <div class="row-btns">
          <button class="btn btn-outline" onclick="document.getElementById('textInput').value='';analyze()">مسح</button>
          <button class="btn btn-outline" onclick="copyToClipboard(document.getElementById('textInput').value, this)">نسخ النص</button>
        </div>
      </div>

      <div class="tool-box">
        <h2>الإحصائيات</h2>
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-number" id="wordCount">0</div><div class="stat-label">كلمة</div></div>
          <div class="stat-card"><div class="stat-number" id="charCount">0</div><div class="stat-label">حرف (مع مسافات)</div></div>
          <div class="stat-card"><div class="stat-number" id="charNoSpace">0</div><div class="stat-label">حرف (بدون مسافات)</div></div>
          <div class="stat-card"><div class="stat-number" id="sentenceCount">0</div><div class="stat-label">جملة</div></div>
          <div class="stat-card"><div class="stat-number" id="paraCount">0</div><div class="stat-label">فقرة</div></div>
          <div class="stat-card"><div class="stat-number" id="readTime">0</div><div class="stat-label">دقيقة قراءة</div></div>
        </div>
      </div>

      <div class="ad-slot ad-banner"><span class="ad-label">إعلان</span></div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    function analyze() {
      const text = document.getElementById('textInput').value;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      const chars = text.length;
      const charsNoSpace = text.replace(/\s/g, '').length;
      const sentences = text.trim() ? (text.match(/[.!?؟।]/g) || []).length || (text.trim() ? 1 : 0) : 0;
      const paras = text.trim() ? text.split(/\n\s*\n/).filter(p => p.trim()).length : 0;
      const readTime = Math.max(1, Math.ceil(words / 200));

      document.getElementById('wordCount').textContent = words.toLocaleString('ar');
      document.getElementById('charCount').textContent = chars.toLocaleString('ar');
      document.getElementById('charNoSpace').textContent = charsNoSpace.toLocaleString('ar');
      document.getElementById('sentenceCount').textContent = sentences.toLocaleString('ar');
      document.getElementById('paraCount').textContent = paras.toLocaleString('ar');
      document.getElementById('readTime').textContent = readTime.toLocaleString('ar');
    }
  </script>
<script src="../js/i18n.js"></script>
<script>initI18n();</script>
</body>
</html>
