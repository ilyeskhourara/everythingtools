<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ضغط الصور مجاناً بدون فقدان الجودة - Everything Tools">
  <title>ضاغط الصور — Everything Tools</title>
    <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
<link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    .drop-zone {
      border: 2px dashed var(--border-hover);
      border-radius: var(--radius);
      padding: 50px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(0,229,160,0.04);
    }
    .drop-zone p { color: var(--text-muted); margin-top: 10px; font-size: 0.9rem; }
    .preview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .preview-item img { width: 100%; border-radius: 8px; border: 1px solid var(--border); }
    .preview-item p { font-size: 0.8rem; color: var(--text-muted); margin-top: 6px; font-family: var(--font-mono); }
    .preview-item h4 { font-size: 0.85rem; margin-bottom: 8px; }
    .size-badge { color: var(--accent); font-weight: 600; }
    #fileInput { display: none; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="logo"><span class="logo-icon">⬡</span><span class="logo-text">Everything<strong>Tools</strong></span></div>
      <nav class="nav"><a href="../index.html" data-i18n="nav.home">Home</a></nav><div class="lang-switcher"><button onclick="setLang('en')" class="lang-btn" id="btn-en">EN</button><button onclick="setLang('fr')" class="lang-btn" id="btn-fr">FR</button><button onclick="setLang('ar')" class="lang-btn" id="btn-ar">AR</button></div>
    </div>
  </header>

  <div class="tool-page-header">
    <div class="container">
      <a href="../index.html" class="back-link">← العودة للرئيسية</a>
      <h1>🖼️ ضاغط الصور</h1>
      <p>قلل حجم صورك بدون فقدان ملحوظ في الجودة — مجاناً وبدون رفع للإنترنت</p>
    </div>
  </div>

  <div class="tool-workspace">
    <div class="container">

      <!-- Ad top -->
      <div class="ad-slot ad-banner"><span class="ad-label">إعلان</span></div>

      <div class="tool-box">
        <h2>اختر صورة</h2>
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <div style="font-size:3rem">🖼️</div>
          <strong>اسحب الصورة هنا أو اضغط للاختيار</strong>
          <p>يدعم: JPG, PNG, WebP — الحد الأقصى 10MB</p>
        </div>
        <input type="file" id="fileInput" accept="image/*" onchange="loadImage(this.files[0])">

        <div class="slider-row mt-4">
          <label>جودة الضغط</label>
          <input type="range" id="quality" min="10" max="95" value="75" oninput="document.getElementById('qVal').textContent=this.value+'%'; recompress()">
          <span id="qVal">75%</span>
        </div>
      </div>

      <div id="previewSection" style="display:none" class="tool-box">
        <h2>المقارنة</h2>
        <div class="preview-grid">
          <div class="preview-item">
            <h4>الأصلية</h4>
            <img id="origImg">
            <p>الحجم: <span id="origSize" class="size-badge">-</span></p>
          </div>
          <div class="preview-item">
            <h4>بعد الضغط</h4>
            <img id="compImg">
            <p>الحجم: <span id="compSize" class="size-badge">-</span> | توفير: <span id="saving" class="size-badge">-</span></p>
          </div>
        </div>
        <div class="row-btns">
          <button class="btn" onclick="downloadCompressed()">⬇ تحميل الصورة المضغوطة</button>
        </div>
      </div>

      <!-- Ad bottom -->
      <div class="ad-slot ad-banner"><span class="ad-label">إعلان</span></div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    let originalFile = null;
    let canvas = document.createElement('canvas');
    let ctx = canvas.getContext('2d');

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); loadImage(e.dataTransfer.files[0]); });

    function loadImage(file) {
      if (!file || !file.type.startsWith('image/')) return;
      originalFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          document.getElementById('origImg').src = e.target.result;
          document.getElementById('origSize').textContent = formatSize(file.size);
          document.getElementById('previewSection').style.display = 'block';
          recompress();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function recompress() {
      if (!originalFile) return;
      const quality = parseInt(document.getElementById('quality').value) / 100;
      const dataURL = canvas.toDataURL('image/jpeg', quality);
      document.getElementById('compImg').src = dataURL;
      const compBytes = Math.round((dataURL.length - 22) * 3 / 4);
      document.getElementById('compSize').textContent = formatSize(compBytes);
      const saving = Math.round((1 - compBytes / originalFile.size) * 100);
      document.getElementById('saving').textContent = saving > 0 ? saving + '%' : '0%';
    }

    function downloadCompressed() {
      const quality = parseInt(document.getElementById('quality').value) / 100;
      const dataURL = canvas.toDataURL('image/jpeg', quality);
      const a = document.createElement('a');
      a.href = dataURL;
      a.download = 'compressed-toolboxpro.jpg';
      a.click();
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }
  </script>
<script src="../js/i18n.js"></script>
<script>initI18n();</script>
</body>
</html>
